name: Build and Test

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ${GITHUB_REPOSITORY#*/}.sln

      - name: Build
        run: dotnet build ${GITHUB_REPOSITORY#*/}.sln --no-restore

      - name: Run tests
        run: dotnet test ${GITHUB_REPOSITORY#*/}.sln --no-build --verbosity normal
